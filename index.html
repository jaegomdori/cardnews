<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카드뉴스 배너</title>
<style>
  :root{
    --bg: #0f1115;
    --arrow-bg: rgba(0,0,0,.45);
    --arrow-bg-hover: rgba(0,0,0,.75);
    --arrow-color: #ffffff;
    --dot: rgba(255,255,255,.45);
    --dot-active: #ffffff;
    --title-bg: linear-gradient(to top, rgba(0,0,0,.7), rgba(0,0,0,0));
    --title-color: #ffffff;
    --radius: 14px;
    --gap: 14px;
    --ratio: 40%;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  .banner{
    position:relative; width:100%;
    background:var(--bg); border-radius:var(--radius);
    overflow:hidden; user-select:none;
  }
  .viewport{ position:relative; width:100%; padding-top:var(--ratio); }
  .track{ position:absolute; inset:0; }
  .slide{
    position:absolute; inset:0;
    opacity:0;
    pointer-events:none;      /* 숨겨진 슬라이드는 클릭 안 받음 (오작동 방지) */
    transition:opacity .6s ease;
  }
  .slide.active{ opacity:1; pointer-events:auto; }
  .card{
    display:block; width:100%; height:100%;
    text-decoration:none; color:inherit; position:relative; cursor:pointer;
  }
  .card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .caption{
    position:absolute; left:0; right:0; bottom:0;
    padding:34px 20px 16px;
    background:var(--title-bg); color:var(--title-color);
    font-family:system-ui, -apple-system, "Malgun Gothic", sans-serif;
    font-size:clamp(14px, 2.4vw, 22px); font-weight:700; line-height:1.3;
  }
  .nav{
    position:absolute; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border:none; cursor:pointer;
    background:var(--arrow-bg); color:var(--arrow-color);
    border-radius:50%; font-size:22px;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s; z-index:3;
  }
  .nav:hover{ background:var(--arrow-bg-hover); }
  .prev{ left:var(--gap); }
  .next{ right:var(--gap); }
  .dots{
    position:absolute; left:0; right:0; bottom:var(--gap);
    display:flex; justify-content:center; gap:8px; z-index:3;
  }
  .dot{
    width:9px; height:9px; border-radius:50%; border:none;
    background:var(--dot); cursor:pointer; padding:0;
    transition:transform .2s, background .2s;
  }
  .dot.active{ background:var(--dot-active); transform:scale(1.25); }
</style>
</head>
<body>

<div class="banner" id="banner">
  <div class="viewport">
    <div class="track" id="track"></div>
  </div>
  <button class="nav prev" id="prev" aria-label="이전">&#10094;</button>
  <button class="nav next" id="next" aria-label="다음">&#10095;</button>
  <div class="dots" id="dots"></div>
</div>

<script>
  /* ============================================================
     ★ 여기 CARDS 목록만 수정하면 됩니다 ★
     - 카드 1개 = { img: 표지이미지, title: 배너 제목, link: 클릭 시 이동할 노션 주소 }
     - 카드를 추가/삭제하면 점·자동넘김이 자동 대응됩니다.
     ------------------------------------------------------------ */
  const CARDS = [
    { img: "1.png", title: "", link: "https://biotrap.notion.site/39e69ba1e49080d09b80d1f6d772ad3f?source=copy_link" },  // 배리 마셜 자가실험
    { img: "2.png", title: "", link: "https://biotrap.notion.site/39e69ba1e49080ebb725f098158b6e6a?source=copy_link" },  // 인간 세포 3D 이미지
    { img: "3.png", title: "", link: "https://biotrap.notion.site/39e69ba1e49080f79c53f37227973fd1?source=copy_link" },  // 요거트 과잉섭취 사례
    { img: "4.png", title: "", link: "https://biotrap.notion.site/39e69ba1e490803a8494d05495d67b9e?source=copy_link" },  // 크리스퍼 다운증후군
    { img: "5.png", title: "", link: "https://biotrap.notion.site/39e69ba1e4908031b145c3a4d05eb9c4?source=copy_link" },  // 뇌종양 mRNA 백신
  ];

  const INTERVAL_MS = 5000;   // ← 자동 넘김 속도(ms). 5000 = 5초
  const OPEN_NEW_TAB = true;  // ← true면 클릭 시 새 탭에서 열림
  /* ============================================================ */

  const track = document.getElementById('track');
  const dotsBox = document.getElementById('dots');
  let index = 0, timer = null;
  const N = CARDS.length;

  CARDS.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'slide';
    const a = document.createElement('a');
    a.className = 'card';
    a.href = c.link || '#';
    if (OPEN_NEW_TAB && c.link && c.link !== '#') { a.target = '_blank'; a.rel = 'noopener'; }
    const img = document.createElement('img');
    img.src = c.img; img.alt = c.title || ('카드 ' + (i+1));
    a.appendChild(img);
    if (c.title) {
      const cap = document.createElement('div');
      cap.className = 'caption';
      cap.textContent = c.title;
      a.appendChild(cap);
    }
    s.appendChild(a);
    track.appendChild(s);
    const d = document.createElement('button');
    d.className = 'dot';
    d.addEventListener('click', () => { go(i); restart(); });
    dotsBox.appendChild(d);
  });

  const slides = track.querySelectorAll('.slide');
  const dots = dotsBox.querySelectorAll('.dot');

  function render(){
    slides.forEach((s,i)=> s.classList.toggle('active', i===index));
    dots.forEach((d,i)=> d.classList.toggle('active', i===index));
  }
  function go(i){ index = (i + N) % N; render(); }
  function next(){ go(index+1); }
  function prev(){ go(index-1); }
  function start(){ timer = setInterval(next, INTERVAL_MS); }
  function stop(){ clearInterval(timer); }
  function restart(){ stop(); start(); }

  document.getElementById('next').addEventListener('click', ()=>{ next(); restart(); });
  document.getElementById('prev').addEventListener('click', ()=>{ prev(); restart(); });
  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'){ next(); restart(); }
    if(e.key==='ArrowLeft'){ prev(); restart(); }
  });
  const banner = document.getElementById('banner');
  banner.addEventListener('mouseenter', stop);
  banner.addEventListener('mouseleave', start);
  let startX = null;
  banner.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; }, {passive:true});
  banner.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(Math.abs(dx) > 40){ dx < 0 ? next() : prev(); restart(); }
    startX = null;
  }, {passive:true});

  render();
  start();
</script>
</body>
</html>
